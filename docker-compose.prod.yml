# =============================================================================
#  Production stack for DigitalOcean droplet
#  nginx (TLS + reverse proxy) + backend + frontend (static) + postgres + redis
#  Includes cron sidecar for daily DB backups to S3-compatible storage
# =============================================================================

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: kiosk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks: [kiosk]

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: kiosk-backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [kiosk]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    container_name: kiosk-frontend
    restart: "no"  # static build, no process to restart
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks: [kiosk]

  postgres:
    image: postgres:16-alpine
    container_name: kiosk-postgres
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [kiosk]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kiosk-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file: .env.production
    volumes:
      - redis_data:/data
    networks: [kiosk]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: kiosk_postgres_prod
  redis_data:
    name: kiosk_redis_prod
  frontend_dist:
    name: kiosk_frontend_dist
  nginx_logs:
    name: kiosk_nginx_logs

networks:
  kiosk:
    name: kiosk_net
    driver: bridge
