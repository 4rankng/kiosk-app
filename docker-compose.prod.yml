# =============================================================================
#  Production stack
#  Backend + Frontend + Postgres + Redis
#  No Adminer, no dev tools. Postgres not exposed to host.
#
#  Reads credentials from the project-root .env file.
#  Usage: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiosk-backend
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
    container_name: kiosk-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend-network

  postgres:
    image: postgres:16-alpine
    container_name: kiosk-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: kiosk-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

volumes:
  postgres_data:
    name: kiosk_postgres_data
  redis_data:
    name: kiosk_redis_data
