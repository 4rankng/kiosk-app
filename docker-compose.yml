# =============================================================================
#  Local development stack
#  Postgres + Redis + Adminer (DB GUI)
#  Backend & frontend are run by hot-reload (not dockerized) for dev speed.
#
#  Reads credentials from the project-root .env file. If .env does not exist,
#  `make dev` will copy .env.example to .env first.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: kiosk-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kiosk-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4.8.1-standalone
    container_name: kiosk-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: kiosk_postgres_data
  redis_data:
    name: kiosk_redis_data
